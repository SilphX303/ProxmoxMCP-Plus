services:
  proxmox-mcp:
    build: .
    command: ["/app/.venv/bin/python", "-m", "proxmox_mcp.server"]
    volumes:
      - /opt/proxmox-mcp/config:/app/proxmox-config:ro
    environment:
      - PROXMOX_MCP_CONFIG=/app/proxmox-config/config.json
      - HOST=0.0.0.0
      - PORT=8811
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8811
      - SERVICE_FQDN_PROXMOXMCP_8811
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;import urllib.error;exec(\"try:\\n urllib.request.urlopen('http://localhost:8811/mcp')\\nexcept urllib.error.HTTPError as e:\\n exit(0 if e.code in (405,406) else 1)\")"]
      interval: 30s
      timeout: 10s
      retries: 3
